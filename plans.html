<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Наши планы – Жду тебя</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Quicksand:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #fff5f7 0%, #ffe4ec 100%);
            min-height: 100vh;
        }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 15px 30px;
            margin-bottom: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            position: sticky;
            top: 20px;
            z-index: 100;
        }
        .logo { font-size: 1.5rem; font-weight: 600; color: #ff6b8b; }
        .logo i { margin-right: 10px; }
        nav ul { display: flex; list-style: none; gap: 20px; flex-wrap: wrap; }
        nav a { text-decoration: none; color: #ff6b8b; font-weight: 500; padding: 8px 20px; border-radius: 50px; transition: all 0.3s; }
        nav a:hover, nav a.active { background: linear-gradient(135deg, #ff6b8b, #ffb7c5); color: white; }
        .menu-btn { display: none; background: none; border: none; font-size: 1.8rem; color: #ff6b8b; cursor: pointer; }
        
        .plans-container {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 40px;
            padding: 40px;
        }
        .plans-container h1 {
            color: #ff6b8b;
            text-align: center;
            margin-bottom: 30px;
        }
        
        .plan-item {
            background: white;
            border-radius: 20px;
            padding: 15px 20px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 10px rgba(0,0,0,0.05);
        }
        .plan-item:hover {
            transform: translateX(5px);
        }
        .plan-check {
            width: 30px;
            height: 30px;
            border: 2px solid #ffb7c5;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ff6b8b;
            font-size: 1.2rem;
        }
        .plan-check.done {
            background: #ff6b8b;
            border-color: #ff6b8b;
            color: white;
        }
        .plan-text {
            flex: 1;
            font-size: 1.1rem;
        }
        .plan-text.done {
            text-decoration: line-through;
            color: #aaa;
        }
        
        .add-plan {
            margin-top: 30px;
            display: flex;
            gap: 10px;
        }
        .add-plan input {
            flex: 1;
            padding: 12px;
            border: 2px solid #ffb7c5;
            border-radius: 50px;
            font-family: 'Quicksand', sans-serif;
        }
        .add-plan button {
            background: linear-gradient(135deg, #ff6b8b, #ffb7c5);
            border: none;
            color: white;
            padding: 12px 25px;
            border-radius: 50px;
            cursor: pointer;
        }
        
        footer { text-align: center; padding: 30px; color: #aaa; margin-top: 40px; }
        
        @media (max-width: 768px) {
            .menu-btn { display: block; }
            nav { display: none; width: 100%; }
            nav.show { display: block; }
            nav ul { flex-direction: column; text-align: center; padding-top: 20px; }
            .plans-container { padding: 20px; }
        }
        
        .floating-heart {
            position: fixed;
            color: #ff6b8b;
            font-size: 24px;
            pointer-events: none;
            animation: floatUp 1s ease-out forwards;
            z-index: 1000;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-100px) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo"><i class="fas fa-heart"></i> Жду тебя</div>
        <button class="menu-btn" id="menuBtn"><i class="fas fa-bars"></i></button>
        <nav id="nav">
            <ul>
                <li><a href="index.html">Главная</a></li>
                <li><a href="diary.html">Дневник</a></li>
                <li><a href="gallery.html">Фото</a></li>
                <li><a href="letter.html">Письмо</a></li>
                <li><a href="plans.html" class="active">Наши планы</a></li>
                <li><a href="playlist.html">Плейлист</a></li>
            </ul>
        </nav>
    </header>

    <div class="plans-container">
        <h1><i class="fas fa-star"></i> Что мы сделаем, когда ты вернёшься</h1>
        
        <div id="plansList"></div>
        
        <div class="add-plan">
            <input type="text" id="newPlanInput" placeholder="Новый план... Например: Сходим в кино">
            <button id="addPlanBtn"><i class="fas fa-plus"></i> Добавить</button>
        </div>
    </div>

    <footer>
        <p>Каждый выполненный план делает нас счастливее</p>
    </footer>
</div>

<script>
    let plans = JSON.parse(localStorage.getItem('romanticPlans')) || [
        { text: "Обняться и не отпускать друг друга 3 часа", done: false },
        { text: "Сходить в кино на твой любимый фильм", done: false },
        { text: "Приготовить вместе ужин", done: false },
        { text: "Устроить пикник в парке", done: false },
        { text: "Поехать в горы на выходные", done: false },
        { text: "Посмотреть все серии нашего сериала", done: false },
        { text: "Сделать тысячу совместных фото", done: false },
        { text: "Просто быть рядом и молчать, потому что слова не нужны", done: false }
    ];
    
    function savePlans() {
        localStorage.setItem('romanticPlans', JSON.stringify(plans));
    }
    
    function togglePlan(index) {
        plans[index].done = !plans[index].done;
        savePlans();
        renderPlans();
    }
    
    function deletePlan(index) {
        plans.splice(index, 1);
        savePlans();
        renderPlans();
    }
    
    function addPlan(text) {
        if(!text.trim()) return;
        plans.push({ text: text, done: false });
        savePlans();
        renderPlans();
    }
    
    function renderPlans() {
        const container = document.getElementById('plansList');
        if(!container) return;
        
        if(plans.length === 0) {
            container.innerHTML = '<div style="text-align: center; padding: 50px;">Добавьте свои планы ❤️</div>';
            return;
        }
        
        container.innerHTML = plans.map((plan, idx) => `
            <div class="plan-item" onclick="togglePlan(${idx})">
                <div class="plan-check ${plan.done ? 'done' : ''}">
                    ${plan.done ? '<i class="fas fa-check"></i>' : ''}
                </div>
                <div class="plan-text ${plan.done ? 'done' : ''}">
                    ${plan.text}
                </div>
                <div onclick="event.stopPropagation(); deletePlan(${idx})" style="color: #ffb7c5; cursor: pointer;">
                    <i class="fas fa-trash-alt"></i>
                </div>
            </div>
        `).join('');
    }
    
    document.getElementById('addPlanBtn')?.addEventListener('click', () => {
        const input = document.getElementById('newPlanInput');
        addPlan(input.value);
        input.value = '';
    });
    
    renderPlans();
    
    document.body.addEventListener('click', function(e) {
        const heart = document.createElement('div');
        heart.className = 'floating-heart';
        heart.innerHTML = '<i class="fas fa-heart"></i>';
        heart.style.left = e.clientX + 'px';
        heart.style.top = e.clientY + 'px';
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 1000);
    });
    
    const menuBtn = document.getElementById('menuBtn');
    const nav = document.getElementById('nav');
    if(menuBtn) menuBtn.addEventListener('click', () => nav.classList.toggle('show'));
</script>
</body>
</html>
