<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дневник – Жду тебя</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Quicksand:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #fff5f7 0%, #ffe4ec 100%);
            min-height: 100vh;
            color: #4a4a4a;
        }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 15px 30px;
            margin-bottom: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            position: sticky;
            top: 20px;
            z-index: 100;
        }
        .logo { font-size: 1.5rem; font-weight: 600; color: #ff6b8b; }
        .logo i { margin-right: 10px; }
        nav ul { display: flex; list-style: none; gap: 20px; flex-wrap: wrap; }
        nav a { text-decoration: none; color: #ff6b8b; font-weight: 500; padding: 8px 20px; border-radius: 50px; transition: all 0.3s; }
        nav a:hover, nav a.active { background: linear-gradient(135deg, #ff6b8b, #ffb7c5); color: white; }
        .menu-btn { display: none; background: none; border: none; font-size: 1.8rem; color: #ff6b8b; cursor: pointer; }
        
        .diary-container {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 40px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
        }
        .diary-container h1 {
            color: #ff6b8b;
            font-family: 'Playfair Display', serif;
            text-align: center;
            margin-bottom: 30px;
        }
        
        .add-entry {
            background: #fff0f3;
            border-radius: 30px;
            padding: 20px;
            margin-bottom: 40px;
        }
        .add-entry textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #ffb7c5;
            border-radius: 20px;
            font-family: 'Quicksand', sans-serif;
            font-size: 1rem;
            resize: vertical;
            margin-bottom: 15px;
        }
        .add-entry button {
            background: linear-gradient(135deg, #ff6b8b, #ffb7c5);
            border: none;
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1rem;
        }
        
        .entry {
            background: white;
            border-radius: 25px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            border-left: 5px solid #ff6b8b;
        }
        .entry-date {
            color: #ff6b8b;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .entry-text {
            line-height: 1.6;
            margin-bottom: 10px;
        }
        .entry-heart {
            color: #ffb7c5;
            cursor: pointer;
        }
        
        footer { text-align: center; padding: 30px; color: #aaa; margin-top: 40px; }
        
        @media (max-width: 768px) {
            .menu-btn { display: block; }
            nav { display: none; width: 100%; }
            nav.show { display: block; }
            nav ul { flex-direction: column; text-align: center; padding-top: 20px; }
            .diary-container { padding: 20px; }
        }
        
        .floating-heart {
            position: fixed;
            color: #ff6b8b;
            font-size: 24px;
            pointer-events: none;
            animation: floatUp 1s ease-out forwards;
            z-index: 1000;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-100px) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo"><i class="fas fa-heart"></i> Жду тебя</div>
        <button class="menu-btn" id="menuBtn"><i class="fas fa-bars"></i></button>
        <nav id="nav">
            <ul>
                <li><a href="index.html">Главная</a></li>
                <li><a href="diary.html" class="active">Дневник</a></li>
                <li><a href="gallery.html">Фото</a></li>
                <li><a href="letter.html">Письмо</a></li>
                <li><a href="plans.html">Наши планы</a></li>
                <li><a href="playlist.html">Плейлист</a></li>
            </ul>
        </nav>
    </header>

    <div class="diary-container">
        <h1><i class="fas fa-book-open"></i> Дневник скучаю</h1>
        
        <div class="add-entry">
            <textarea id="newEntryText" rows="3" placeholder="Напиши, как прошёл твой день, что ты чувствуешь, как скучаешь..."></textarea>
            <button id="saveEntryBtn"><i class="fas fa-heart"></i> Сохранить запись</button>
        </div>
        
        <div id="entriesContainer"></div>
    </div>

    <footer>
        <p>Каждая запись – это ещё одно доказательство моей любви</p>
    </footer>
</div>

<script>
    let entries = JSON.parse(localStorage.getItem('diaryEntries')) || [];
    
    function saveEntries() {
        localStorage.setItem('diaryEntries', JSON.stringify(entries));
    }
    
    function addEntry(text) {
        if(!text.trim()) return;
        const entry = {
            id: Date.now(),
            date: new Date().toLocaleString('ru-RU'),
            text: text
        };
        entries.unshift(entry);
        saveEntries();
        renderEntries();
    }
    
    function deleteEntry(id) {
        entries = entries.filter(e => e.id != id);
        saveEntries();
        renderEntries();
    }
    
    function renderEntries() {
        const container = document.getElementById('entriesContainer');
        if(!container) return;
        
        if(entries.length === 0) {
            container.innerHTML = '<div style="text-align: center; padding: 50px; color: #aaa;">Пока нет записей. Напиши свою первую мысль о ней ❤️</div>';
            return;
        }
        
        container.innerHTML = entries.map(entry => `
            <div class="entry">
                <div class="entry-date"><i class="far fa-calendar-alt"></i> ${entry.date}</div>
                <div class="entry-text">${entry.text.replace(/\n/g, '<br>')}</div>
                <div class="entry-heart" onclick="deleteEntry(${entry.id})">
                    <i class="far fa-heart"></i> Удалить
                </div>
            </div>
        `).join('');
    }
    
    document.getElementById('saveEntryBtn')?.addEventListener('click', () => {
        const text = document.getElementById('newEntryText').value;
        addEntry(text);
        document.getElementById('newEntryText').value = '';
    });
    
    renderEntries();
    
    // Сердечки при клике
    document.body.addEventListener('click', function(e) {
        const heart = document.createElement('div');
        heart.className = 'floating-heart';
        heart.innerHTML = '<i class="fas fa-heart"></i>';
        heart.style.left = e.clientX + 'px';
        heart.style.top = e.clientY + 'px';
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 1000);
    });
    
    const menuBtn = document.getElementById('menuBtn');
    const nav = document.getElementById('nav');
    if(menuBtn) menuBtn.addEventListener('click', () => nav.classList.toggle('show'));
</script>
</body>
</html>
