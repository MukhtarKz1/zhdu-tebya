<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Скучаю по тебе | Моя любимая</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Quicksand:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #5de0f1 0%, #f76792 100%);
            min-height: 100vh;
            color: #4a4a4a;
            overflow-x: hidden;
        }

        /* Анимация фона */
        .heart-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .heart {
            position: absolute;
            color: #ff0000;
            font-size: 20px;
            opacity: 0.3;
            animation: floatHeart 15s infinite linear;
        }

        @keyframes floatHeart {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0.3;
            }
            100% {
                transform: translateY(-20vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* Контейнер */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        /* Шапка */
        header {
            background: rgba(247, 247, 247, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 15px 30px;
            margin-bottom: 40px;
            box-shadow: 0 10px 30px rgba(255, 107, 139, 0.15);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            position: sticky;
            top: 20px;
            z-index: 100;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 600;
            color: #ff6b8b;
        }

        .logo i {
            margin-right: 10px;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 20px;
            flex-wrap: wrap;
        }

        nav a {
            text-decoration: none;
            color: #ff6b8b;
            font-weight: 500;
            padding: 8px 20px;
            border-radius: 50px;
            transition: all 0.3s;
        }

        nav a:hover, nav a.active {
            background: linear-gradient(135deg, #ff6b8b, #ffb7c5);
            color: white;
        }

        /* Кнопка для мобильных */
        .menu-btn {
            display: none;
            background: none;
            border: none;
            font-size: 1.8rem;
            color: #ff6b8b;
            cursor: pointer;
        }

        /* Главный счетчик */
        .hero {
            text-align: center;
            padding: 80px 20px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 60px;
            margin-bottom: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
        }

        .counter-box {
            position: relative;
        }

        .counter-box h1 {
            font-size: 1.8rem;
            color: #ff6b8b;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        .days-number {
            font-size: 8rem;
            font-weight: 700;
            font-family: 'Playfair Display', serif;
            background: linear-gradient(135deg, #ff6b8b, #ffb7c5);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 20px 0;
        }

        .subtitle {
            font-size: 1.3rem;
            color: #888;
            margin-top: 20px;
        }

        .love-quote {
            margin-top: 40px;
            font-style: italic;
            font-size: 1.2rem;
            color: #ff6b8b;
            padding: 20px;
            background: #fff0f3;
            border-radius: 50px;
            display: inline-block;
        }

        /* Секция с музыкой */
        .music-player {
            background: white;
            border-radius: 30px;
            padding: 20px;
            margin-bottom: 40px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        .music-player h3 {
            color: #ff6b8b;
            margin-bottom: 15px;
        }

        .play-btn {
            background: linear-gradient(135deg, #ff6b8b, #ffb7c5);
            border: none;
            color: rgb(0, 0, 0);
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .play-btn:hover {
            transform: scale(1.05);
        }

        /* Подвал */
        footer {
            text-align: center;
            padding: 30px;
            color: #aaa;
            font-size: 0.9rem;
            margin-top: 40px;
        }

        /* Адаптивность */
        @media (max-width: 768px) {
            .menu-btn {
                display: block;
            }
            
            nav {
                display: none;
                width: 100%;
            }
            
            nav.show {
                display: block;
            }
            
            nav ul {
                flex-direction: column;
                text-align: center;
                padding-top: 20px;
            }
            
            .days-number {
                font-size: 4rem;
            }
            
            .hero h1 {
                font-size: 1.3rem;
            }
        }

        /* Плавающие сердечки при клике */
        .floating-heart {
            position: fixed;
            color: #ff0000;
            font-size: 24px;
            pointer-events: none;
            animation: floatUp 1s ease-out forwards;
            z-index: 1000;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) scale(1.5);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

<div class="heart-bg" id="heartBg"></div>

<div class="container">
    <header>
        <div class="logo">
            <i class="fas fa-heart"></i> СКУЧАЮ
        </div>
        <button class="menu-btn" id="menuBtn">
            <i class="fas fa-bars"></i>
        </button>
        <nav id="nav">
            <ul>
                <li><a href="index.html" class="active">Главная</a></li>
                <li><a href="diary.html">Дневник</a></li>
                <li><a href="gallery.html">Фото</a></li>
                <li><a href="letter.html">Письмо</a></li>
                <li><a href="plans.html">Наши планы</a></li>
                <li><a href="playlist.html">Плейлист</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="hero">
            <div class="counter-box">
                <h1>ДО НАШЕЙ ВСТРЕЧИ ОСТАЛОСЬ</h1>
                <div class="days-number" id="daysCounter">87</div>
                <div class="subtitle">дней</div>
                <div class="love-quote">
                    <i class="fas fa-quote-left"></i> Каждый день без тебя приближает меня к нашей встрече. Я жду тебя, моя любовь. <i class="fas fa-quote-right"></i>
                </div>
            </div>
        </div>

        <div class="music-player">
            <h3><i class="fas fa-music"></i> Наша песня</h3>
            <button class="play-btn" id="playBtn">
                <i class="fas fa-play"></i> Включить нашу песню
            </button>
            <audio id="loveSong" loop>
                <source src="C:\Games\" type="audio/mpeg">
            </audio>
            <p style="margin-top: 15px; font-size: 0.8rem; color: #aaa;">♡ Песня, которая напоминает мне о тебе ♡</p>
        </div>
    </main>

    <footer>
        <p>Я тебя люблю и жду. ♡</p>
        <p>Каждый день я думаю о тебе</p>
    </footer>
</div>

<script>
    // ========== СОЗДАНИЕ ПЛАВАЮЩИХ СЕРДЕЧЕК ==========
    function createHearts() {
        const bg = document.getElementById('heartBg');
        for(let i = 0; i < 30; i++) {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.innerHTML = '<i class="fas fa-heart"></i>';
            heart.style.left = Math.random() * 100 + '%';
            heart.style.animationDuration = Math.random() * 10 + 10 + 's';
            heart.style.animationDelay = Math.random() * 15 + 's';
            heart.style.fontSize = Math.random() * 20 + 10 + 'px';
            bg.appendChild(heart);
        }
    }
    createHearts();

    // ========== СЧЕТЧИК ДНЕЙ ==========
    // Установите ДАТУ ВОЗВРАЩЕНИЯ здесь (год, месяц (0-11), число)
    // ПРИМЕР: если возвращается 15 декабря 2024: (2024, 11, 15)
    const returnDate = new Date(2026, 8, 25); // ИЗМЕНИТЕ ЭТУ ДАТУ! (год, месяц-1, число)
    
    function updateCounter() {
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        const diffTime = returnDate - today;
        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        
        const counter = document.getElementById('daysCounter');
        if (counter) {
            if (diffDays <= 0) {
                counter.innerHTML = "0";
                document.querySelector('.love-quote').innerHTML = '<i class="fas fa-quote-left"></i> Мы снова вместе! Я так ждал этот день. Люблю тебя! <i class="fas fa-quote-right"></i>';
            } else {
                counter.innerHTML = diffDays;
            }
        }
    }
    updateCounter();

    // ========== МУЗЫКА ==========
    const audio = document.getElementById('loveSong');
    const playBtn = document.getElementById('playBtn');
    let isPlaying = false;

    if(playBtn) {
        playBtn.addEventListener('click', function() {
            if(isPlaying) {
                audio.pause();
                playBtn.innerHTML = '<i class="fas fa-play"></i> Включить нашу песню';
                isPlaying = false;
            } else {
                audio.play();
                playBtn.innerHTML = '<i class="fas fa-pause"></i> Выключить песню';
                isPlaying = true;
            }
        });
    }

    // ========== СЕРДЕЧКИ ПРИ КЛИКЕ ==========
    document.body.addEventListener('click', function(e) {
        const heart = document.createElement('div');
        heart.className = 'floating-heart';
        heart.innerHTML = '<i class="fas fa-heart"></i>';
        heart.style.left = e.clientX + 'px';
        heart.style.top = e.clientY + 'px';
        document.body.appendChild(heart);
        
        setTimeout(() => {
            heart.remove();
        }, 1000);
    });

    // ========== МОБИЛЬНОЕ МЕНЮ ==========
    const menuBtn = document.getElementById('menuBtn');
    const nav = document.getElementById('nav');
    if(menuBtn) {
        menuBtn.addEventListener('click', () => {
            nav.classList.toggle('show');
        });
    }
</script>
</body>
</html>
