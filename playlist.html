<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Плейлист – Жду тебя</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Quicksand:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #fff5f7 0%, #ffe4ec 100%);
            min-height: 100vh;
        }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 15px 30px;
            margin-bottom: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            position: sticky;
            top: 20px;
            z-index: 100;
        }
        .logo { font-size: 1.5rem; font-weight: 600; color: #ff6b8b; }
        .logo i { margin-right: 10px; }
        nav ul { display: flex; list-style: none; gap: 20px; flex-wrap: wrap; }
        nav a { text-decoration: none; color: #ff6b8b; font-weight: 500; padding: 8px 20px; border-radius: 50px; transition: all 0.3s; }
        nav a:hover, nav a.active { background: linear-gradient(135deg, #ff6b8b, #ffb7c5); color: white; }
        .menu-btn { display: none; background: none; border: none; font-size: 1.8rem; color: #ff6b8b; cursor: pointer; }
        
        .playlist-container {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 40px;
            padding: 40px;
        }
        .playlist-container h1 {
            color: #ff6b8b;
            text-align: center;
            margin-bottom: 30px;
        }
        
        .song-item {
            background: white;
            border-radius: 20px;
            padding: 15px 20px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s;
            box-shadow: 0 5px 10px rgba(0,0,0,0.05);
        }
        .song-number {
            width: 40px;
            height: 40px;
            background: #ffb7c5;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }
        .song-info {
            flex: 1;
        }
        .song-name {
            font-weight: 600;
            color: #4a4a4a;
        }
        .song-link {
            font-size: 0.8rem;
            color: #ff6b8b;
            text-decoration: none;
        }
        
        .add-song {
            margin-top: 30px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .add-song input {
            flex: 1;
            padding: 12px;
            border: 2px solid #ffb7c5;
            border-radius: 50px;
            font-family: 'Quicksand', sans-serif;
        }
        .add-song button {
            background: linear-gradient(135deg, #ff6b8b, #ffb7c5);
            border: none;
            color: white;
            padding: 12px 25px;
            border-radius: 50px;
            cursor: pointer;
        }
        
        footer { text-align: center; padding: 30px; color: #aaa; margin-top: 40px; }
        
        @media (max-width: 768px) {
            .menu-btn { display: block; }
            nav { display: none; width: 100%; }
            nav.show { display: block; }
            nav ul { flex-direction: column; text-align: center; padding-top: 20px; }
            .playlist-container { padding: 20px; }
        }
        
        .floating-heart {
            position: fixed;
            color: #ff6b8b;
            font-size: 24px;
            pointer-events: none;
            animation: floatUp 1s ease-out forwards;
            z-index: 1000;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-100px) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo"><i class="fas fa-heart"></i> Жду тебя</div>
        <button class="menu-btn" id="menuBtn"><i class="fas fa-bars"></i></button>
        <nav id="nav">
            <ul>
                <li><a href="index.html">Главная</a></li>
                <li><a href="diary.html">Дневник</a></li>
                <li><a href="gallery.html">Фото</a></li>
                <li><a href="letter.html">Письмо</a></li>
                <li><a href="plans.html">Наши планы</a></li>
                <li><a href="playlist.html" class="active">Плейлист</a></li>
            </ul>
        </nav>
    </header>

    <div class="playlist-container">
        <h1><i class="fas fa-headphones"></i> Наш плейлист</h1>
        
        <div id="songsList"></div>
        
        <div class="add-song">
            <input type="text" id="newSongName" placeholder="Название песни">
            <input type="text" id="newSongLink" placeholder="Ссылка на YouTube/Spotify (необязательно)">
            <button id="addSongBtn"><i class="fas fa-plus"></i> Добавить</button>
        </div>
    </div>

    <footer>
        <p>Эти песни напоминают мне о тебе</p>
    </footer>
</div>

<script>
    let songs = JSON.parse(localStorage.getItem('romanticSongs')) || [
        { name: "Наша песня (вставь название)", link: "#" }
    ];
    
    function saveSongs() {
        localStorage.setItem('romanticSongs', JSON.stringify(songs));
    }
    
    function deleteSong(index) {
        songs.splice(index, 1);
        saveSongs();
        renderSongs();
    }
    
    function addSong(name, link) {
        if(!name.trim()) return;
        songs.push({ name: name, link: link || "#" });
        saveSongs();
        renderSongs();
    }
    
    function renderSongs() {
        const container = document.getElementById('songsList');
        if(!container) return;
        
        if(songs.length === 0) {
            container.innerHTML = '<div style="text-align: center; padding: 50px;">Добавьте ваши любимые песни ❤️</div>';
            return;
        }
        
        container.innerHTML = songs.map((song, idx) => `
            <div class="song-item">
                <div class="song-number">${idx+1}</div>
                <div class="song-info">
                    <div class="song-name">${song.name}</div>
                    ${song.link !== '#' ? `<a href="${song.link}" target="_blank" class="song-link"><i class="fab fa-youtube"></i> Слушать</a>` : ''}
                </div>
                <div onclick="deleteSong(${idx})" style="color: #ffb7c5; cursor: pointer;">
                    <i class="fas fa-trash-alt"></i>
                </div>
            </div>
        `).join('');
    }
    
    document.getElementById('addSongBtn')?.addEventListener('click', () => {
        const name = document.getElementById('newSongName').value;
        const link = document.getElementById('newSongLink').value;
        addSong(name, link);
        document.getElementById('newSongName').value = '';
        document.getElementById('newSongLink').value = '';
    });
    
    renderSongs();
    
    document.body.addEventListener('click', function(e) {
        const heart = document.createElement('div');
        heart.className = 'floating-heart';
        heart.innerHTML = '<i class="fas fa-heart"></i>';
        heart.style.left = e.clientX + 'px';
        heart.style.top = e.clientY + 'px';
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 1000);
    });
    
    const menuBtn = document.getElementById('menuBtn');
    const nav = document.getElementById('nav');
    if(menuBtn) menuBtn.addEventListener('click', () => nav.classList.toggle('show'));
</script>
</body>
</html>
